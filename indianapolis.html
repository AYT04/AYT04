<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IndiGuess - Indiana Daily Street View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background: #0f172a; color: white; overflow: hidden; }
        #pano { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 1; background: #1e293b; }
        .ui-overlay { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .interactive { pointer-events: auto; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .guess-input:focus { outline: none; border-color: #6d4aff; }
        
        /* Proton Ad Styling */
        .ad-banner { position: absolute; bottom: 100px; right: 20px; width: 260px; padding: 16px; z-index: 100; animation: slideIn 0.8s ease-out; }
        .proton-btn { background: #6d4aff; color: white; font-weight: 700; padding: 10px 18px; border-radius: 8px; display: inline-block; transition: all 0.2s; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); }
        .proton-btn:hover { background: #5a3edb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(109, 74, 255, 0.4); }

        .coupon-box { border: 2px dashed #6d4aff; background: rgba(109, 74, 255, 0.15); border-radius: 12px; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        /* Hide Google UI elements for cleaner look */
        .gm-style-cc, .gmnoprint { display: none !important; }
    </style>
</head>
<body>

    <div id="pano">
        <div class="flex items-center justify-center h-full text-slate-500">
            <div class="text-center">
                <i class="fas fa-map-location-dot text-4xl mb-4 animate-pulse"></i>
                <p>Loading Indiana...</p>
            </div>
        </div>
    </div>

    <div class="ui-overlay">
        <!-- Header -->
        <div class="flex justify-between items-start">
            <div class="glass p-4 interactive shadow-xl border-indigo-500/20">
                <h1 class="text-2xl font-black tracking-tight text-white flex items-center gap-2">
                    <span class="text-indigo-500">Indi</span>Guess
                </h1>
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold" id="current-date">-- -- ----</p>
            </div>
            
            <div class="glass p-4 interactive text-right">
                <div class="text-xs uppercase font-bold text-slate-400 mb-1">Attempts</div>
                <div class="flex gap-1 justify-end" id="guess-dots">
                    <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                    <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                    <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                    <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                    <div class="w-3 h-3 rounded-full bg-indigo-500"></div>
                </div>
            </div>
        </div>

        <!-- Proton Side Ad -->
        <div class="ad-banner glass interactive shadow-2xl border-indigo-500/30">
            <div class="flex items-center gap-3 mb-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center">
                    <i class="fas fa-envelope-shield text-white text-xl"></i>
                </div>
                <div>
                    <span class="text-sm font-black uppercase tracking-tighter">Proton Mail</span>
                    <p class="text-[9px] text-indigo-300 font-bold uppercase">Private by Default</p>
                </div>
            </div>
            <p class="text-xs text-slate-300 mb-4 leading-relaxed">Ditch Big Tech. Switch to encrypted email hosted in Switzerland.</p>
            <a href="https://proton.me/mail" target="_blank" class="proton-btn text-xs w-full text-center">Switch to Proton</a>
        </div>

        <!-- Guessing Bar -->
        <div class="flex justify-center mb-10">
            <div class="glass p-6 w-full max-w-md interactive shadow-2xl border-white/5">
                <div id="game-ui">
                    <div class="flex gap-2">
                        <input type="text" id="city-guess" autocomplete="off" placeholder="Enter an Indiana city..." 
                               class="flex-1 bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white guess-input transition-all">
                        <button onclick="makeGuess()" 
                                class="bg-indigo-600 hover:bg-indigo-700 px-6 py-3 rounded-xl font-black text-sm transition-all active:scale-95">
                            GUESS
                        </button>
                    </div>
                    <div id="guess-history" class="mt-4 space-y-2 max-h-24 overflow-y-auto pr-2"></div>
                </div>

                <div id="result-ui" class="hidden text-center animate-fadeIn">
                    <h2 id="result-title" class="text-2xl font-black mb-1"></h2>
                    <p id="result-detail" class="text-sm text-slate-400 mb-6"></p>
                    <button onclick="openRewardModal()" class="w-full bg-indigo-600 hover:bg-indigo-700 py-4 rounded-xl font-black transition-all flex items-center justify-center gap-2 shadow-lg shadow-indigo-500/20">
                        <i class="fas fa-gift"></i> VIEW DAILY COUPON
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Reward Modal -->
    <div id="reward-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="glass p-8 max-w-sm w-full interactive text-center border-indigo-500/40 shadow-2xl relative">
            <button onclick="closeRewardModal()" class="absolute top-4 right-4 text-slate-500 hover:text-white transition">
                <i class="fas fa-xmark text-xl"></i>
            </button>
            
            <div class="mb-6">
                <div class="w-16 h-16 bg-indigo-500/20 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/50">
                    <i class="fas fa-shield-heart text-3xl text-indigo-400"></i>
                </div>
                <h3 class="text-xl font-black">Daily Reward</h3>
                <p id="reward-type" class="text-sm text-indigo-300 font-bold uppercase tracking-widest mt-1">Proton Pass Exclusive</p>
            </div>

            <div class="coupon-box p-5 mb-8">
                <p class="text-[10px] uppercase font-black text-slate-400 mb-2">Claim Code at Proton.me</p>
                <p id="coupon-code" class="text-3xl font-mono font-black text-white tracking-widest">---</p>
            </div>

            <div class="text-left border-t border-slate-800 pt-6">
                <div class="flex items-center justify-between mb-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-tighter">Optional: Your API Key</label>
                    <span class="text-[9px] text-indigo-400 font-bold">Free Tier Supported</span>
                </div>
                <div class="flex gap-2">
                    <input type="password" id="api-key-input" placeholder="Paste key to remove watermark..." 
                           class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-2 text-xs focus:border-indigo-500 outline-none transition-all">
                    <button onclick="saveApiKey()" class="bg-slate-800 hover:bg-indigo-600 px-4 py-2 rounded-lg text-[10px] font-black transition-all">SET</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let panorama, targetLocation, targetCity = "Indianapolis", guesses = 0, isGameOver = false;
        const IN_BOUNDS = { north: 41.76, south: 37.77, west: -88.09, east: -84.78 };

        function seededRandom(seed) {
            const x = Math.sin(seed++) * 10000;
            return x - Math.floor(x);
        }

        function initGame() {
            const today = new Date();
            document.getElementById('current-date').innerText = today.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
            
            const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
            const lat = IN_BOUNDS.south + seededRandom(seed) * (IN_BOUNDS.north - IN_BOUNDS.south);
            const lng = IN_BOUNDS.west + seededRandom(seed + 1) * (IN_BOUNDS.east - IN_BOUNDS.west);
            
            const sv = new google.maps.StreetViewService();
            sv.getPanorama({ location: {lat, lng}, radius: 20000, source: 'outdoor' }, (data, status) => {
                if (status === "OK") {
                    targetLocation = data.location.latLng;
                    panorama = new google.maps.StreetViewPanorama(document.getElementById("pano"), {
                        position: targetLocation,
                        pov: { heading: 100, pitch: 0 },
                        zoom: 0,
                        addressControl: false,
                        showRoadLabels: false,
                        panControl: true,
                        enableCloseButton: false
                    });

                    new google.maps.Geocoder().geocode({ location: targetLocation }, (results, gStatus) => {
                        if (gStatus === "OK" && results[0]) {
                            const locality = results[0].address_components.find(c => c.types.includes("locality"));
                            targetCity = locality ? locality.long_name : "Indiana";
                        }
                    });
                } else {
                    document.getElementById('pano').innerHTML = `<div class="flex h-full items-center justify-center text-slate-500">API Key Missing or Quota Hit. Please set a key in settings.</div>`;
                }
            });
        }

        function makeGuess() {
            if (isGameOver) return;
            const input = document.getElementById('city-guess');
            const val = input.value.trim();
            if (!val) return;

            guesses++;
            updateDots();

            const entry = document.createElement('div');
            entry.className = "text-[11px] font-bold flex justify-between p-3 rounded-lg bg-slate-900/80 border border-slate-800 animate-slideIn";

            if (val.toLowerCase() === targetCity.toLowerCase()) {
                entry.innerHTML = `<span class="text-indigo-400">📍 ${val}</span> <span class="text-green-400">WINNER</span>`;
                endGame(true);
            } else {
                new google.maps.Geocoder().geocode({ address: val + ", Indiana" }, (results, status) => {
                    let distMsg = "Unknown Location";
                    if (status === "OK") {
                        const dist = google.maps.geometry.spherical.computeDistanceBetween(results[0].geometry.location, targetLocation);
                        distMsg = `${(dist * 0.000621371).toFixed(1)} miles away`;
                    }
                    entry.innerHTML = `<span class="text-slate-500">❌ ${val}</span> <span class="text-indigo-300/60">${distMsg}</span>`;
                    if (guesses >= 5 && !isGameOver) endGame(false);
                });
            }
            document.getElementById('guess-history').prepend(entry);
            input.value = "";
        }

        function updateDots() {
            const dots = document.getElementById('guess-dots').children;
            for(let i=0; i<guesses; i++) {
                dots[4-i].className = "w-3 h-3 rounded-full bg-slate-700";
            }
        }

        function endGame(win) {
            isGameOver = true;
            document.getElementById('game-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('result-title').innerText = win ? "PERFECT! 🎉" : "GAME OVER";
            document.getElementById('result-title').className = win ? "text-2xl font-black mb-1 text-green-400" : "text-2xl font-black mb-1 text-red-400";
            document.getElementById('result-detail').innerText = `It was ${targetCity}. Come back tomorrow for a new spot!`;
        }

        function openRewardModal() {
            const isMail = Math.random() > 0.5;
            document.getElementById('reward-type').innerText = isMail ? "Proton Mail Discount" : "Proton Pass Premium Deal";
            document.getElementById('coupon-code').innerText = (isMail ? "INDI-MAIL-" : "INDI-PASS-") + Math.floor(Math.random()*9999);
            document.getElementById('api-key-input').value = localStorage.getItem('indiguess_key') || "";
            document.getElementById('reward-modal').classList.remove('hidden');
        }

        function closeRewardModal() { document.getElementById('reward-modal').classList.add('hidden'); }

        function saveApiKey() {
            localStorage.setItem('indiguess_key', document.getElementById('api-key-input').value.trim());
            location.reload();
        }

        function loadMaps() {
            const key = localStorage.getItem('indiguess_key') || "";
            const s = document.createElement('script');
            // Using the key parameter even if empty triggers the "Dev" mode fallback
            s.src = `https://maps.googleapis.com/maps/api/js?key=${key}&libraries=geometry&callback=initGame`;
            document.head.appendChild(s);
        }

        document.getElementById('city-guess').addEventListener('keypress', (e) => { if(e.key==='Enter') makeGuess(); });
        window.onload = loadMaps;
    </script>
</body>
</html>
