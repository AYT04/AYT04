<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flagle Mini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
            overflow-x: hidden;
        }
        .flag-grid-tile {
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden-tile {
            background-color: #e5e7eb;
            border: 1px solid #f3f4f6;
        }
        .revealed-tile {
            opacity: 0;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 10px;
        }
        /* Sidebar transition */
        #sidebar {
            transition: transform 0.3s ease-in-out;
        }
        .sidebar-closed {
            transform: translateX(-100%);
        }
        .sidebar-open {
            transform: translateX(0);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-40 hidden opacity-0 transition-opacity duration-300"></div>

    <!-- Sidebar Menu -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-white shadow-2xl z-50 p-6 sidebar-closed">
        <div class="flex justify-between items-center mb-8">
            <h2 class="font-semibold text-gray-500 uppercase tracking-widest text-xs">Game Mode</h2>
            <button id="close-menu" class="text-gray-400 hover:text-gray-600">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <nav class="flex flex-col gap-2">
            <button onclick="setMode('world')" class="mode-btn flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors text-left" data-mode="world">
                <span class="text-xl">🌍</span>
                <div>
                    <div class="font-medium text-sm">World Countries</div>
                    <div class="text-[10px] text-gray-400">250+ Territories</div>
                </div>
            </button>
            <button onclick="setMode('us')" class="mode-btn flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors text-left" data-mode="us">
                <span class="text-xl">🇺🇸</span>
                <div>
                    <div class="font-medium text-sm">US States</div>
                    <div class="text-[10px] text-gray-400">50 States</div>
                </div>
            </button>
            <button onclick="setMode('canada')" class="mode-btn flex items-center gap-3 p-3 rounded-xl hover:bg-gray-50 transition-colors text-left" data-mode="canada">
                <span class="text-xl">🇨🇦</span>
                <div>
                    <div class="font-medium text-sm">Canada Provinces</div>
                    <div class="text-[10px] text-gray-400">Provinces & Territories</div>
                </div>
            </button>
        </nav>
        <div class="mt-auto absolute bottom-8 left-6 right-6">
            <p class="text-[10px] text-gray-400 text-center">Inspired by Flagle</p>
        </div>
    </aside>

    <!-- Header -->
    <header class="w-full max-w-md flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <button id="open-menu" class="p-2 -ml-2 hover:bg-gray-100 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <h1 class="text-2xl font-light tracking-tight">FLAGLE<span class="font-semibold text-blue-600">MINI</span></h1>
        </div>
        <div class="flex items-center gap-1">
            <span id="mode-indicator" class="text-[10px] font-bold uppercase tracking-tighter text-gray-400 mr-2 bg-gray-100 px-2 py-0.5 rounded">World</span>
            <button id="reset-btn" class="p-2 hover:bg-gray-100 rounded-full transition-colors" title="New Game">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            </button>
        </div>
    </header>

    <!-- Game Container -->
    <main class="w-full max-w-md flex flex-col gap-6">
        
        <!-- Flag Display -->
        <div id="flag-container" class="relative aspect-[3/2] w-full bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <img id="target-flag" src="" alt="Flag" class="w-full h-full object-cover">
            
            <!-- Revelation Grid (6 pieces) -->
            <div id="grid-overlay" class="absolute inset-0 grid grid-cols-3 grid-rows-2">
                <div class="flag-grid-tile hidden-tile" data-index="0"></div>
                <div class="flag-grid-tile hidden-tile" data-index="1"></div>
                <div class="flag-grid-tile hidden-tile" data-index="2"></div>
                <div class="flag-grid-tile hidden-tile" data-index="3"></div>
                <div class="flag-grid-tile hidden-tile" data-index="4"></div>
                <div class="flag-grid-tile hidden-tile" data-index="5"></div>
            </div>
        </div>

        <!-- Input Area (Moved Above Guess List) -->
        <div class="relative w-full" id="input-section">
            <input 
                type="text" 
                id="country-input" 
                placeholder="Enter name..." 
                class="w-full p-4 bg-white border border-gray-200 rounded-2xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                autocomplete="off"
            >
            <div id="suggestions" class="absolute top-full left-0 w-full mt-2 bg-white border border-gray-200 rounded-xl shadow-xl max-h-48 overflow-y-auto hidden z-20 custom-scrollbar">
                <!-- Suggestions injected here -->
            </div>
        </div>

        <!-- Success Message -->
        <div id="success-card" class="hidden p-6 bg-green-50 border border-green-100 rounded-2xl text-center">
            <h2 class="text-green-800 font-semibold text-lg mb-1">Correct!</h2>
            <p id="correct-name" class="text-green-700 mb-4 font-medium"></p>
            <button onclick="initGame()" class="px-6 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-colors">Play Again</button>
        </div>

        <!-- Feedback & Guesses (Now Below Input) -->
        <div id="guess-list" class="flex flex-col gap-2 min-h-[140px]">
            <!-- Guesses will appear here -->
        </div>
    </main>

        // Constants & State
        let worldCountries = [];
        let currentDataset = [];
        let currentMode = 'world'; // 'world' | 'us' | 'canada'
        let targetCountry = null;
        let guesses = [];
        const MAX_GUESSES = 6;
        const GRID_INDICES = [0, 1, 2, 3, 4, 5];
        let shuffledGrid = [];

        // Elements
        const input = document.getElementById('country-input');
        const suggestionsDiv = document.getElementById('suggestions');
        const guessList = document.getElementById('guess-list');
        const targetFlag = document.getElementById('target-flag');
        const gridTiles = document.querySelectorAll('.flag-grid-tile');
        const successCard = document.getElementById('success-card');
        const correctNameLabel = document.getElementById('correct-name');
        const inputSection = document.getElementById('input-section');
        const resetBtn = document.getElementById('reset-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const modeIndicator = document.getElementById('mode-indicator');

        // Sidebar logic
        document.getElementById('open-menu').onclick = () => {
            sidebar.classList.remove('sidebar-closed');
            sidebar.classList.add('sidebar-open');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
        };

        const closeSidebar = () => {
            sidebar.classList.add('sidebar-closed');
            sidebar.classList.remove('sidebar-open');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        };

        document.getElementById('close-menu').onclick = closeSidebar;
        overlay.onclick = closeSidebar;

        // Mode Switching
        function setMode(mode) {
            currentMode = mode;
            closeSidebar();
            
            // Highlight active mode in sidebar
            document.querySelectorAll('.mode-btn').forEach(btn => {
                if(btn.dataset.mode === mode) btn.classList.add('bg-blue-50', 'ring-1', 'ring-blue-100');
                else btn.classList.remove('bg-blue-50', 'ring-1', 'ring-blue-100');
            });

            modeIndicator.textContent = mode === 'world' ? 'World' : mode === 'us' ? 'USA' : 'Canada';

            if (mode === 'world') currentDataset = worldCountries;
            else if (mode === 'us') currentDataset = US_STATES;
            else if (mode === 'canada') currentDataset = CANADA_PROVINCES;

            initGame();
        }

        // Initialize Data
        async function fetchWorldData() {
            try {
                const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,cca2,latlng');
                const data = await response.json();
                worldCountries = data.map(c => ({
                    name: c.name.common,
                    code: c.cca2.toLowerCase(),
                    flag: c.flags.svg,
                    coords: c.latlng
                })).sort((a, b) => a.name.localeCompare(b.name));
                
                setMode('world');
            } catch (err) {
                console.error("Failed to fetch countries", err);
            }
        }

        function initGame() {
            if (currentDataset.length === 0) return;
            
            guesses = [];
            targetCountry = currentDataset[Math.floor(Math.random() * currentDataset.length)];
            shuffledGrid = [...GRID_INDICES].sort(() => Math.random() - 0.5);
            
            targetFlag.src = targetCountry.flag;
            guessList.innerHTML = '';
            input.value = '';
            input.disabled = false;
            inputSection.classList.remove('hidden');
            successCard.classList.add('hidden');
            gridTiles.forEach(tile => {
                tile.classList.add('hidden-tile');
                tile.classList.remove('revealed-tile');
            });

            console.log(`New Game [${currentMode}]: Target is ${targetCountry.name}`);
        }

        // Search logic
        input.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.length < 1) {
                suggestionsDiv.classList.add('hidden');
                return;
            }

            const matches = currentDataset
                .filter(c => c.name.toLowerCase().includes(val))
                .slice(0, 5);

            if (matches.length > 0) {
                suggestionsDiv.innerHTML = matches.map(c => `
                    <div class="p-3 hover:bg-gray-50 cursor-pointer border-b border-gray-50 last:border-none text-sm" onclick="handleGuess('${c.name.replace(/'/g, "\\'")}')">
                        ${c.name}
                    </div>
                `).join('');
                suggestionsDiv.classList.remove('hidden');
            } else {
                suggestionsDiv.classList.add('hidden');
            }
        });

        function handleGuess(name) {
            const item = currentDataset.find(c => c.name === name);
            if (!item || guesses.some(g => g.name === name)) return;

            suggestionsDiv.classList.add('hidden');
            input.value = '';
            
            guesses.push(item);
            revealNextTile();
            renderGuesses();

            if (item.name === targetCountry.name) {
                winGame();
            } else if (guesses.length >= MAX_GUESSES) {
                loseGame();
            }
        }

        function revealNextTile() {
            const nextTileIndex = shuffledGrid[guesses.length - 1];
            if (nextTileIndex !== undefined) {
                const tile = document.querySelector(`.flag-grid-tile[data-index="${nextTileIndex}"]`);
                tile.classList.remove('hidden-tile');
                tile.classList.add('revealed-tile');
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return Math.round(R * c);
        }

        function getDirection(lat1, lon1, lat2, lon2) {
            const dLon = (lon2 - lon1);
            const y = Math.sin(dLon * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos(dLon * Math.PI / 180);
            let brng = Math.atan2(y, x) * 180 / Math.PI;
            brng = (brng + 360) % 360;
            const arrows = ['⬆️', '↗️', '➡️', '↘️', '⬇️', '↙️', '⬅️', '↖️'];
            return arrows[Math.round(brng / 45) % 8];
        }

        function renderGuesses() {
            guessList.innerHTML = guesses.map(g => {
                const isCorrect = g.name === targetCountry.name;
                const dist = calculateDistance(g.coords[0], g.coords[1], targetCountry.coords[0], targetCountry.coords[1]);
                const dir = getDirection(g.coords[0], g.coords[1], targetCountry.coords[0], targetCountry.coords[1]);
                
                return `
                    <div class="flex items-center justify-between p-3 bg-white border border-gray-100 rounded-xl shadow-sm animate-in fade-in slide-in-from-bottom-2 duration-300">
                        <span class="text-sm font-medium truncate max-w-[180px]">${g.name}</span>
                        <div class="flex items-center gap-3 text-xs text-gray-500">
                            ${isCorrect ? 
                                '<span class="text-green-600 font-bold">🎯 CORRECT</span>' : 
                                `<span>${dist.toLocaleString()} km</span> <span class="text-lg leading-none">${dir}</span>`
                            }
                        </div>
                    </div>
                `;
            }).join('');
        }

        function winGame() {
            gridTiles.forEach(t => { t.classList.remove('hidden-tile'); t.classList.add('revealed-tile'); });
            input.disabled = true;
            inputSection.classList.add('hidden');
            successCard.classList.remove('hidden');
            successCard.classList.replace('bg-red-50', 'bg-green-50');
            successCard.classList.replace('border-red-100', 'border-green-100');
            successCard.querySelector('h2').textContent = "Correct!";
            successCard.querySelector('h2').className = "text-green-800 font-semibold text-lg mb-1";
            successCard.querySelector('button').className = "px-6 py-2 bg-green-600 text-white rounded-full hover:bg-green-700 transition-colors";
            correctNameLabel.textContent = targetCountry.name;
            correctNameLabel.className = "text-green-700 mb-4 font-medium";
        }

        function loseGame() {
            gridTiles.forEach(t => { t.classList.remove('hidden-tile'); t.classList.add('revealed-tile'); });
            input.disabled = true;
            inputSection.classList.add('hidden');
            successCard.classList.remove('hidden');
            successCard.classList.replace('bg-green-50', 'bg-red-50');
            successCard.classList.replace('border-green-100', 'border-red-100');
            successCard.querySelector('h2').textContent = "Game Over";
            successCard.querySelector('h2').className = "text-red-800 font-semibold text-lg mb-1";
            successCard.querySelector('button').className = "px-6 py-2 bg-red-600 text-white rounded-full hover:bg-red-700 transition-colors";
            correctNameLabel.textContent = `The answer was ${targetCountry.name}`;
            correctNameLabel.className = "text-red-700 mb-4 font-medium";
        }

        resetBtn.addEventListener('click', initGame);

        // Start
        fetchWorldData();
    </script>
</body>
</html>
