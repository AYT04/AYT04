<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Detective - AYTGuessr</title>
    <meta property="og:title" content="AYT04">
    <meta property="og:description" content="My Free GeoGuessr clone, inspired by ZigZag & RainBolt!">
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/153463910?v=4">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#7f12d8">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background-color: #1e293b; font-family: 'Inter', sans-serif;
            position: fixed; touch-action: none;
        }

        #pano {
            width: 100vw; height: 100%;
            position: absolute; top: 0; left: 0;
            z-index: 1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        /* Interactive Mini Map */
        #map-wrapper {
            position: absolute; bottom: 20px; right: 20px;
            width: 250px; height: 200px; 
            border-radius: 12px; z-index: 2000;
            display: flex; flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        #map-wrapper:hover, #map-wrapper:focus-within, #map-wrapper.expanded {
            width: 500px; height: 350px;
        }

        #map {
            flex: 1; width: 100%;
            cursor: crosshair; background: #e2e8f0;
        }

        /* Map UI Buttons */
        .map-control-btn {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 768px) {
            #map-wrapper { width: 120px; height: 120px; bottom: 10px; right: 10px; }
            #map-wrapper:hover, #map-wrapper:focus-within, #map-wrapper.expanded {
                width: 95%; height: 60%; bottom: 20px; right: 2.5%;
            }
        }

        /* Loader */
        #loader {
            position: absolute; inset: 0; background: #0f172a;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 4000;
        }
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1); border-left-color: #3b82f6;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner mb-4"></div>
        <p class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Deploying to Street...</p>
    </div>

    <!-- Interactive Google Street View Background -->
    <div id="pano"></div>

    <!-- Top HUD (Stats & Compass) -->
    <div class="fixed top-4 left-4 right-4 z-[2000] flex justify-between pointer-events-none">
        <div class="flex gap-3 pointer-events-auto">
            <!-- Round Indicator -->
            <div class="glass px-4 py-2.5 rounded-full flex items-center gap-2 text-sm md:text-base font-black text-slate-800 shadow-lg">
                <span class="w-2.5 h-2.5 rounded-full bg-blue-500 animate-pulse"></span>
                <span id="round-num">Round 1/5</span>
            </div>
            <!-- Score Indicator -->
            <div class="glass px-4 py-2.5 rounded-full flex items-center gap-2 text-sm md:text-base font-black text-slate-800 shadow-lg">
                ⭐ <span id="total-score" class="text-blue-600">0</span>
            </div>
        </div>
        
        <!-- Compass -->
        <div class="glass w-12 h-12 rounded-full flex items-center justify-center shadow-lg pointer-events-auto border-2 border-white">
            <svg id="compass-arrow" width="24" height="24" viewBox="0 0 24 24" class="transform transition-transform duration-100 ease-linear">
                <path fill="#ef4444" d="M12 2L8 12h8z"/> <!-- Red North Needle -->
                <path fill="#475569" d="M12 22L8 12h8z"/> <!-- Grey South Needle -->
            </svg>
        </div>
    </div>

    <!-- Expandable Mini Map -->
    <div id="map-wrapper" class="glass shadow-2xl">
        <div class="absolute top-2 right-2 z-[2500] flex flex-col gap-2">
            <!-- Mobile Expand Close / Shrink map -->
            <button id="shrink-map-btn" class="hidden map-control-btn w-8 h-8 text-slate-800 font-bold hover:bg-white text-lg">✕</button>
            <!-- Theme Toggle -->
            <button id="theme-toggle-btn" class="map-control-btn w-8 h-8 text-slate-800 hover:bg-white text-lg">🌙</button>
        </div>
        <div id="map"></div>
        <div class="p-2 bg-white border-t border-slate-100">
            <button id="guess-confirm-btn" disabled class="w-full bg-slate-300 cursor-not-allowed text-white font-black text-sm py-2 rounded-lg transition-colors">PLACE GUESS</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="result-screen" class="hidden fixed inset-0 bg-slate-900/60 z-[3000] flex-col items-center justify-center backdrop-blur-sm p-4">
        <div class="bg-white rounded-3xl p-8 max-w-md w-full text-center shadow-2xl transform transition-all">
            <h2 class="text-3xl font-black text-slate-800 mb-2">Location Secured</h2>
            <p id="dist-val" class="text-lg text-slate-500 font-bold mb-4">--</p>
            <div class="text-5xl font-black text-blue-600 mb-8" id="round-score">+0</div>
            <button id="next-round-btn" class="w-full bg-slate-900 text-white font-bold text-lg py-4 rounded-xl hover:bg-blue-600 transition-colors">NEXT ROUND</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const GOOGLE_API_KEY = 'AIzaSyC1PB8yLb2AzlngIuJMPexzoW13LR7zAZ8';
        
        let map, panorama, svService, guessMarker, actualMarker, polyline;
        let actualLocation = null, userGuess = null, totalScore = 0, currentRound = 1, currentMapTheme = 'light';
        let gameActive = false;
        const MAX_ROUNDS = 5;

        window.init = function() {
            svService = new google.maps.StreetViewService();
            map = L.map('map', { center: [20, 0], zoom: 1, zoomControl: false, attributionControl: false, tap: false });
            window.tileLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

            // Setup Map Expand Mechanics
            const wrapper = document.getElementById('map-wrapper');
            wrapper.addEventListener('transitionend', () => map.invalidateSize());
            
            const shrinkBtn = document.getElementById('shrink-map-btn');

            // Mobile Expand Mechanics
            wrapper.addEventListener('click', (e) => {
                if (!wrapper.classList.contains('expanded')) {
                    wrapper.classList.add('expanded');
                    if(window.innerWidth <= 768) shrinkBtn.classList.remove('hidden');
                    setTimeout(() => map.invalidateSize(), 150);
                }
            });
            
            // Shrink Mobile Map
            shrinkBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                wrapper.classList.remove('expanded');
                shrinkBtn.classList.add('hidden');
                setTimeout(() => map.invalidateSize(), 150);
            });

            // Theme Toggle Mechanic
            document.getElementById('theme-toggle-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (currentMapTheme === 'light') {
                    window.tileLayer.setUrl('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png');
                    e.target.innerText = '☀️';
                    currentMapTheme = 'dark';
                } else {
                    window.tileLayer.setUrl('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png');
                    e.target.innerText = '🌙';
                    currentMapTheme = 'light';
                }
            });

            map.on('click', (e) => {
                if (!gameActive) return;
                userGuess = e.latlng;
                
                if (guessMarker) guessMarker.setLatLng(userGuess);
                else guessMarker = L.marker(userGuess, {
                    icon: L.divIcon({ className: 'bg-blue-500 w-5 h-5 rounded-full border-2 border-white shadow-xl', iconSize: [20, 20] })
                }).addTo(map);

                const btn = document.getElementById('guess-confirm-btn');
                btn.disabled = false;
                btn.classList.replace('bg-slate-300', 'bg-blue-600');
                btn.classList.replace('cursor-not-allowed', 'cursor-pointer');
            });

            document.getElementById('guess-confirm-btn').addEventListener('click', submitGuess);
            document.getElementById('next-round-btn').addEventListener('click', nextRound);

            loadNewLocation();
        }

        function loadNewLocation() {
            document.getElementById('loader').style.display = 'flex';
            if (guessMarker) map.removeLayer(guessMarker);
            if (actualMarker) map.removeLayer(actualMarker);
            if (polyline) map.removeLayer(polyline);
            userGuess = null; 
            
            const btn = document.getElementById('guess-confirm-btn');
            btn.disabled = true;
            btn.classList.replace('bg-blue-600', 'bg-slate-300');
            btn.classList.replace('cursor-pointer', 'cursor-not-allowed');
            document.getElementById('map-wrapper').classList.remove('expanded');
            document.getElementById('shrink-map-btn').classList.add('hidden');

            findRandomStreetView();
        }

        function findRandomStreetView() {
            // Lat constrained slightly (-60 to 70) to avoid deep poles with zero coverage
            const lat = (Math.random() * 130) - 60; 
            const lng = (Math.random() * 360) - 180;
            
            svService.getPanorama({
                location: {lat, lng},
                radius: 100000, // Search within 100km of the random point
                source: google.maps.StreetViewSource.OUTDOOR // Prefer roads over inside businesses
            }, (data, status) => {
                if (status === 'OK' && data.location) {
                    actualLocation = { lat: data.location.latLng.lat(), lng: data.location.latLng.lng() };
                    
                    if (!panorama) {
                        panorama = new google.maps.StreetViewPanorama(document.getElementById('pano'), {
                            pano: data.location.pano,
                            addressControl: false,
                            showRoadLabels: false,
                            linksControl: true,
                            panControl: true,
                            enableCloseButton: false,
                            zoomControl: false,
                            fullscreenControl: false
                        });
                        
                        // Compass Sync
                        panorama.addListener('pov_changed', () => {
                            const compass = document.getElementById('compass-arrow');
                            if(compass) compass.style.transform = `rotate(${panorama.getPov().heading}deg)`;
                        });
                    } else {
                        panorama.setPano(data.location.pano);
                    }
                
                    document.getElementById('loader').style.display = 'none';
                    map.setView([20, 0], 1);
                    gameActive = true;
                } else {
                    // Fails silently and quickly retries if it hits the ocean or unmapped areas
                    setTimeout(findRandomStreetView, 150); 
                }
            });
        }

        function submitGuess(e) {
            e.stopPropagation();
            if (!userGuess || !gameActive) return;
            gameActive = false;

            const dist = calculateDistance(userGuess.lat, userGuess.lng, actualLocation.lat, actualLocation.lng);
            // Global scoring curve: Drops off over thousands of kilometers instead of single digits
            const roundScore = Math.max(0, Math.round(5000 * Math.exp(-dist / 2000))); 
            totalScore += roundScore;

            actualMarker = L.marker([actualLocation.lat, actualLocation.lng], {
                icon: L.divIcon({ className: 'bg-green-500 w-5 h-5 rounded-full border-2 border-white shadow-xl', iconSize: [20, 20] })
            }).addTo(map);

            polyline = L.polyline([userGuess, [actualLocation.lat, actualLocation.lng]], { color: '#10b981', weight: 3, dashArray: '5, 5' }).addTo(map);

            setTimeout(() => {
                map.invalidateSize();
                map.fitBounds(polyline.getBounds(), { padding: [40, 40] });
            }, 300);

            // Update Result Modal
            document.getElementById('dist-val').innerText = dist < 1 ? `${Math.round(dist * 1000)} meters away` : `${dist.toFixed(2)} km away`;
            document.getElementById('round-score').innerText = `+${roundScore}`;
            document.getElementById('total-score').innerText = totalScore.toLocaleString();

            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('flex');
            
            if (currentRound >= MAX_ROUNDS) {
                document.getElementById('next-round-btn').innerText = 'PLAY AGAIN';
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function nextRound() {
            if (currentRound >= MAX_ROUNDS) {
                currentRound = 1;
                totalScore = 0;
                document.getElementById('total-score').innerText = '0';
                document.getElementById('next-round-btn').innerText = 'NEXT ROUND';
            } else {
                currentRound++;
            }

            document.getElementById('round-num').innerText = `Round ${currentRound}/${MAX_ROUNDS}`;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('flex');
            loadNewLocation();
        }

        // Dynamic Google Maps Script Loader
        window.onload = () => {
            if(GOOGLE_API_KEY === 'YOUR_GOOGLE_MAPS_API_KEY') {
                alert("Please add your Google Maps API Key to the GOOGLE_API_KEY variable in the code to play.");
                return;
            }
            const script = document.createElement('script');
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_API_KEY}&callback=init`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        };
    </script>
</body>
</html>
