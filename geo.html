        /* Minimal structure just to center the image and button layout */
        body { font-family: sans-serif; padding: 20px; background: #111; color: #fff; text-align: center; }
        #image-container { width: 100%; max-width: 800px; height: 500px; background: #222; margin: 20px auto; position: relative; border: 1px solid #333; }
        #street-image { width: 100%; height: 100%; object-fit: cover; display: none; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
        .control-panel { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background: #3b82f6; color: white; border: none; border-radius: 6px; }
        button:disabled { cursor: not-allowed; opacity: 0.6; background: #4b5563; }
        #open-modal-btn { background: #10b981; }

        /* Pure CSS Modal Styles */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
            display: none; align-items: center; justify-content: center; z-index: 9999; padding: 20px;
        }
        .modal-overlay:target { display: flex; }
        .modal-content {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            width: 100%; max-width: 700px; height: 80vh; padding: 20px;
            display: flex; flex-direction: column; gap: 15px; position: relative;
        }
        #osm-map { width: 100%; flex-grow: 1; background: #242424; border-radius: 8px; }
        .close-modal-link {
            position: absolute; top: 15px; right: 20px; color: #94a3b8;
            text-decoration: none; font-size: 24px; font-weight: bold;
        }
        .close-modal-link:hover { color: white; }
        #email-guess-btn { background: #ea580c; width: 100%; }

        function init() {
            const nextBtn = document.getElementById('next-img-btn');
            const emailBtn = document.getElementById('email-guess-btn');
            
            // Setup Map inside CSS Modal Engine
            map = L.map('osm-map', { center: [20, 0], zoom: 1 });
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Leaflet map containers inside hidden CSS elements need manual sizing on open
            window.addEventListener('hashchange', () => {
                if (window.location.hash === '#guess-modal') {
                    setTimeout(() => map.invalidateSize(), 50);
                }
            });

            // Handle Pin placements on map
            map.on('click', (e) => {
                userGuessCoords = e.latlng;
                if (guessMarker) {
                    guessMarker.setLatLng(userGuessCoords);
                } else {
                    guessMarker = L.marker(userGuessCoords).addTo(map);
                }
                emailBtn.disabled = false;
                emailBtn.innerText = "Submit Guess via Email";
            });

            nextBtn.addEventListener('click', () => {
                loadNewLocation();
                startCooldown();
            });

            emailBtn.addEventListener('click', sendEmailGuess);

            loadNewLocation();
        }

        async function loadNewLocation() {
            const loader = document.getElementById('loader');
            const imgElement = document.getElementById('street-image');
            const emailBtn = document.getElementById('email-guess-btn');
            
            loader.style.display = 'block';
            imgElement.style.display = 'none';
            
            // Reset previous user pin guess inputs
            userGuessCoords = null;
            if (guessMarker) { map.removeLayer(guessMarker); guessMarker = null; }
            emailBtn.disabled = true;
            emailBtn.innerText = "Select a Location First";

            try {
                const city = CITIES[Math.floor(Math.random() * CITIES.length)];
                const lat = city.lat + (Math.random() - 0.5) * 0.15;
                const lng = city.lng + (Math.random() - 0.5) * 0.15;
                const bbox = `${lng-0.03},${lat-0.03},${lng+0.03},${lat+0.03}`;
                
                const resp = await fetch(`https://graph.mapillary.com/images?access_token=${MLY_KEY}&fields=id,geometry,thumb_original_url&bbox=${bbox}&limit=5`);
                const data = await resp.json();
                
                if(!data.data || data.data.length === 0) throw new Error("No images found");
                
                const img = data.data[0];
                currentImageURL = img.thumb_original_url;
                imgElement.src = currentImageURL;
                imgElement.onload = () => {
                    loader.style.display = 'none';
                    imgElement.style.display = 'block';
                };
            } catch (e) { 
                console.log("Retrying location fetch...");
                loadNewLocation(); 
            }
        }

        function startCooldown() {
            const btn = document.getElementById('next-img-btn');
            let timeLeft = COOLDOWN_TIME;
            btn.disabled = true;
            
            if (cooldownTimer) clearInterval(cooldownTimer);

            cooldownTimer = setInterval(() => {
                timeLeft--;
                let minutes = Math.floor(timeLeft / 60);
                let seconds = timeLeft % 60;
                let displaySeconds = seconds < 10 ? "0" + seconds : seconds;

                btn.innerText = `Wait (${minutes}:${displaySeconds})`;

                if (timeLeft <= 0) {
                    clearInterval(cooldownTimer);
                    btn.disabled = false;
                    btn.innerText = "Get New Image";
                }
            }, 1000);
        }

        function sendEmailGuess() {
            if (!userGuessCoords) return;

            const subject = encodeURIComponent("GeoGuessr NMPZ Guess");
            const body = encodeURIComponent(
                `Hey! Here is my guess for the image.\n\n` +
                `Image URL: ${currentImageURL}\n\n` +
                `My Coordinates:\n\n` +
                `Latitude: ${userGuessCoords.lat.toFixed(6)}\n\n` +
                `Longitude: ${userGuessCoords.lng.toFixed(6)}\n\n` +
                `Let me know how close I was!`
            );

            // Spawns system default mail client pipeline
            window.location.href = `mailto:${TARGET_EMAIL}?subject=${subject}&body=${body}`;
            
            // Automatically close out modal view
            window.location.hash = '#';
        }

        window.onload = init;
    </script>
