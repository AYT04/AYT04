<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Detective - Geo Guessing Game</title>
    <!-- Leaflet CSS for the map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            height: 100vh;
            margin: 0;
            position: fixed; /* Prevent scrolling/overscroll on mobile */
            width: 100%;
        }

        #game-wrapper {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #image-container {
            flex-grow: 1;
            width: 100%;
            background: #1e293b;
            position: relative;
            overflow: hidden;
        }

        #street-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Responsive Map Container */
        #map-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 150px; 
            height: 100px; 
            border-radius: 16px;
            border: 3px solid white;
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.8);
            z-index: 1000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            opacity: 0.9;
            cursor: crosshair;
        }

        /* Desktop Hover Behavior */
        @media (min-width: 768px) {
            #map-container:hover {
                width: 400px;
                height: 300px;
                opacity: 1;
            }
        }

        /* Mobile Expanded State / End of Round State */
        #map-container.active {
            width: calc(100% - 32px) !important;
            height: calc(85% - 100px) !important;
            bottom: 16px !important;
            right: 16px !important;
            opacity: 1;
            border-width: 4px;
        }

        #guess-map {
            height: 100%;
            width: 100%;
            background: #242424;
        }

        .ui-overlay {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            z-index: 1001;
            pointer-events: none;
        }

        .score-pill {
            pointer-events: auto;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #loader {
            position: absolute;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        #api-limit-screen {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #3b82f6;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Guess Button toggle */
        #mobile-map-toggle {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 1002;
            display: none;
        }

        @media (max-width: 767px) {
            #mobile-map-toggle {
                display: block;
            }
        }

        #next-btn {
            pointer-events: auto;
        }

        .leaflet-container {
            cursor: crosshair !important;
        }
    </style>
</head>
<body>

    <div id="api-limit-screen">
        <h1 class="text-5xl font-black text-red-600 mb-4 uppercase italic">API LIMIT</h1>
        <p class="text-lg text-slate-300 mb-8 px-4">The Street View API is taking a breather. We hit the limit.</p>
        <div class="rounded-2xl overflow-hidden shadow-2xl mb-8 max-w-xs mx-auto">
             <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJidmZ3eWtjNmNqcmYwdmZ3eWtjNmNqcmYwdmZ3eWtjNmNqcmYmZXA9YjZfaW50ZXJuYWxfZ2lmX2J5X2lkJmN0PWc/H75eliy1jJSGIbaubS/giphy.gif" 
             alt="Panic" class="w-full">
        </div>
        <p class="text-slate-500 italic">Cooling down for <span id="cooldown-timer" class="font-mono text-white">60</span>s...</p>
    </div>

    <div id="loader">
        <div class="spinner mb-6"></div>
        <p class="text-xl font-semibold text-slate-200" id="loader-text">Finding a location...</p>
    </div>

    <div id="game-wrapper">
        <div id="image-container">
            <img id="street-image" src="" alt="Street View">
            
            <div class="ui-overlay">
                <div class="score-pill p-4 rounded-2xl shadow-2xl transition-all duration-300 max-w-sm mx-auto md:mx-0">
                    <div class="flex justify-between items-center mb-1">
                        <div class="flex flex-col">
                            <span class="text-slate-400 uppercase tracking-widest font-bold text-[10px]">Round</span>
                            <span id="round-num" class="text-yellow-400 font-mono text-xl font-bold leading-none">1</span>
                        </div>
                        <div class="flex flex-col items-end">
                            <span class="text-slate-400 uppercase tracking-widest font-bold text-[10px]">Total Score</span>
                            <span id="total-score" class="text-green-400 font-mono text-xl font-bold leading-none">0</span>
                        </div>
                    </div>
                    
                    <div id="result-info" class="hidden border-t border-slate-700/50 pt-3 mt-3">
                        <div class="flex justify-between items-end mb-4">
                            <div>
                                <span class="text-blue-400 font-black text-3xl leading-none" id="dist-val">0</span>
                                <span class="text-slate-400 text-[10px] font-bold uppercase block mt-1">KM AWAY</span>
                            </div>
                            <div class="text-right">
                                <span class="text-white font-bold text-xl block" id="round-points">+0</span>
                                <span class="text-slate-400 text-[10px] font-bold uppercase block">POINTS</span>
                            </div>
                        </div>
                        <button id="next-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-95 touch-manipulation">
                            CONTINUE
                        </button>
                    </div>
                </div>
            </div>

            <button id="mobile-map-toggle" class="bg-white/10 backdrop-blur-md border border-white/20 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
            </button>

            <div id="map-container">
                <div id="guess-map"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // --- CONSTANTS ---
        const PROXY_URL = ''; 
        const FALLBACK_KEY = 'MLY|26365638989761752|674fe324cc911b1f69eafdab6a735e03';
        
        // --- STATE ---
        let map, guessMarker, actualMarker, polyline;
        let actualLocation = null;
        let userGuess = null;
        let totalScore = 0;
        let currentRound = 1;
        let isApiLimitMode = false;
        let roundEnded = false;
        let isMapExpanded = false;

        const ANCHOR_CITIES = [
            { name: "New York", lat: 40.7128, lng: -74.0060 },
            { name: "London", lat: 51.5074, lng: -0.1278 },
            { name: "Paris", lat: 48.8566, lng: 2.3522 },
            { name: "Tokyo", lat: 35.6895, lng: 139.6917 },
            { name: "Berlin", lat: 52.5200, lng: 13.4050 },
            { name: "Sydney", lat: -33.8688, lng: 151.2093 },
            { name: "São Paulo", lat: -23.5505, lng: -46.6333 },
            { name: "Cape Town", lat: -33.9249, lng: 18.4241 },
            { name: "Seoul", lat: 37.5665, lng: 126.9780 },
            { name: "Mexico City", lat: 19.4326, lng: -99.1332 },
            { name: "Rome", lat: 41.9028, lng: 12.4964 },
            { name: "Madrid", lat: 40.4168, lng: -3.7038 },
            { name: "Toronto", lat: 43.6532, lng: -79.3832 },
            { name: "Los Angeles", lat: 34.0522, lng: -118.2437 },
            { name: "Amsterdam", lat: 52.3676, lng: 4.9041 },
            { name: "Bangkok", lat: 13.7563, lng: 100.5018 },
            { name: "Singapore", lat: 1.3521, lng: 103.8198 },
            { name: "Buenos Aires", lat: -34.6037, lng: -58.3816 },
            { name: "Lisbon", lat: 38.7223, lng: -9.1393 },
            { name: "Dublin", lat: 53.3498, lng: -6.2603 },
            { name: "Stockholm", lat: 59.3293, lng: 18.0686 },
            { name: "Helsinki", lat: 60.1695, lng: 24.9354 },
            { name: "Copenhagen", lat: 55.6761, lng: 12.5683 }
        ];

        function init() {
            // Leaflet setup
            map = L.map('guess-map', {
                center: [20, 0],
                zoom: 1,
                worldCopyJump: true,
                zoomControl: false,
                attributionControl: false
            });

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            const mapContainer = document.getElementById('map-container');
            const toggleBtn = document.getElementById('mobile-map-toggle');
            
            // Re-render map on container resize
            mapContainer.addEventListener('transitionend', () => map.invalidateSize());
            
            // Map Expansion Logic
            toggleBtn.addEventListener('click', () => {
                isMapExpanded = !isMapExpanded;
                if (isMapExpanded) {
                    mapContainer.classList.add('active');
                } else {
                    if (!roundEnded) mapContainer.classList.remove('active');
                }
                setTimeout(() => map.invalidateSize(), 50);
            });

            // Prevent map clicks from closing the map on mobile
            mapContainer.addEventListener('click', (e) => {
                if (window.innerWidth < 768 && !isMapExpanded && !roundEnded) {
                    isMapExpanded = true;
                    mapContainer.classList.add('active');
                    setTimeout(() => map.invalidateSize(), 50);
                    e.stopPropagation();
                }
            });

            map.on('click', onMapClick);
            document.getElementById('next-btn').addEventListener('click', nextRound);

            loadNewLocation();
        }

        function triggerOhShitMode() {
            if (isApiLimitMode) return;
            isApiLimitMode = true;
            document.getElementById('api-limit-screen').style.display = 'flex';
            
            let seconds = 60;
            const timerEl = document.getElementById('cooldown-timer');
            const interval = setInterval(() => {
                seconds--;
                timerEl.innerText = seconds;
                if (seconds <= 0) {
                    clearInterval(interval);
                    isApiLimitMode = false;
                    document.getElementById('api-limit-screen').style.display = 'none';
                    loadNewLocation();
                }
            }, 1000);
        }

        async function loadNewLocation() {
            if (isApiLimitMode) return;
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader-text').innerText = "Scouting location...";
            
            // UI Reset
            document.getElementById('result-info').classList.add('hidden');
            document.getElementById('map-container').classList.remove('active');
            isMapExpanded = false;
            roundEnded = false;
            
            if (guessMarker) map.removeLayer(guessMarker);
            if (actualMarker) map.removeLayer(actualMarker);
            if (polyline) map.removeLayer(polyline);
            userGuess = null;
            
            try {
                const imageData = await fetchRandomMapillaryImage();
                const imgElement = document.getElementById('street-image');
                imgElement.src = imageData.thumb_original_url;
                actualLocation = {
                    lat: imageData.geometry.coordinates[1],
                    lng: imageData.geometry.coordinates[0]
                };
                imgElement.onload = () => {
                    document.getElementById('loader').style.display = 'none';
                    map.setView([20, 0], 1);
                };
            } catch (error) {
                if (error.message.includes("limit") || error.message.includes("429") || error.message.includes("403")) {
                    triggerOhShitMode();
                } else {
                    document.getElementById('loader-text').innerText = "Moving to next city...";
                    setTimeout(loadNewLocation, 300);
                }
            }
        }

        async function fetchRandomMapillaryImage() {
            const city = ANCHOR_CITIES[Math.floor(Math.random() * ANCHOR_CITIES.length)];
            const lat = city.lat + (Math.random() - 0.5) * 0.4; // Slightly wider search
            const lng = city.lng + (Math.random() - 0.5) * 0.4;
            const radius = 0.08;
            const bbox = `${lng-radius},${lat-radius},${lng+radius},${lat+radius}`;
            
            let searchUrl = PROXY_URL 
                ? `${PROXY_URL}/api/mapillary?bbox=${bbox}`
                : `https://graph.mapillary.com/images?access_token=${FALLBACK_KEY}&fields=id,geometry,thumb_original_url&bbox=${bbox}&limit=50`;
            
            const response = await fetch(searchUrl);
            
            if (response.status === 429 || response.status === 403) {
                throw new Error("API limit hit");
            }
            
            if (!response.ok) throw new Error("API call failed");
            
            const data = await response.json();
            const validImages = data.data?.filter(img => img.thumb_original_url && img.geometry) || [];
            
            if (validImages.length === 0) throw new Error(`No images found near ${city.name}`);
            return validImages[Math.floor(Math.random() * validImages.length)];
        }

        function onMapClick(e) {
            if (userGuess || roundEnded) return; 
            
            // If map is tiny (mobile), expand it instead of guessing
            if (window.innerWidth < 768 && !isMapExpanded) {
                isMapExpanded = true;
                document.getElementById('map-container').classList.add('active');
                setTimeout(() => map.invalidateSize(), 400);
                return;
            }

            userGuess = e.latlng;
            guessMarker = L.marker(userGuess, {
                icon: L.divIcon({
                    className: 'bg-blue-500 w-5 h-5 rounded-full border-2 border-white shadow-xl',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                })
            }).addTo(map);

            setTimeout(submitGuess, 350);
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function calculateScore(distance) {
            if (distance > 15000) return 0;
            const score = Math.round(5000 * Math.exp(-distance / 2000));
            return Math.max(0, score);
        }

        function submitGuess() {
            if (!userGuess || !actualLocation) return;
            roundEnded = true;
            isMapExpanded = true;
            
            const dist = calculateDistance(userGuess.lat, userGuess.lng, actualLocation.lat, actualLocation.lng);
            const roundScore = calculateScore(dist);
            totalScore += roundScore;

            // Enforce expanded view
            const mapContainer = document.getElementById('map-container');
            mapContainer.classList.add('active');
            map.invalidateSize();

            actualMarker = L.marker([actualLocation.lat, actualLocation.lng], {
                icon: L.divIcon({
                    className: 'bg-red-500 w-5 h-5 rounded-full border-2 border-white shadow-xl',
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                })
            }).addTo(map);

            polyline = L.polyline([userGuess, [actualLocation.lat, actualLocation.lng]], {
                color: 'white',
                dashArray: '8, 12',
                weight: 3,
                opacity: 0.8
            }).addTo(map);

            // Zoom to fit both points
            setTimeout(() => {
                map.fitBounds(polyline.getBounds(), { 
                    padding: [40, 40],
                    maxZoom: 12
                });
            }, 500);

            // Update UI
            document.getElementById('dist-val').innerText = Math.round(dist).toLocaleString();
            document.getElementById('round-points').innerText = `+${roundScore.toLocaleString()}`;
            document.getElementById('total-score').innerText = totalScore.toLocaleString();
            document.getElementById('result-info').classList.remove('hidden');
        }

        function nextRound() {
            currentRound++;
            document.getElementById('round-num').innerText = currentRound;
            loadNewLocation();
        }

        window.onload = init;
    </script>
</body>
</html>
