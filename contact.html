<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hit me up 🤙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            /* Matching the gradient from your index.html */
            background: linear-gradient(to bottom right, #7f12d8, #ff0033);
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass rounded-3xl shadow-2xl max-w-lg w-full p-8 md:p-10 text-white border-white/20">
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-bold tracking-tight mb-2">hit me up ✨</h1>
        </div>

        <form id="contactForm" class="space-y-5">
            <div>
                <label for="name" class="block text-xs font-medium uppercase tracking-widest text-white/60 mb-1 ml-1">Subject:</label>
                <input type="text" id="name" name="name" placeholder="what's the subject?" required 
                class="block w-full px-4 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-white/40 focus:ring-2 focus:ring-white/50 focus:border-transparent outline-none transition-all">
            </div>

            <div>
                <label for="message" class="block text-xs font-medium uppercase tracking-widest text-white/60 mb-1 ml-1">Message:</label>
                <textarea id="message" name="message" rows="4" placeholder="type your message here..." required 
                class="block w-full px-4 py-4 bg-white/10 border border-white/20 rounded-2xl text-white placeholder-white/40 focus:ring-2 focus:ring-white/50 focus:border-transparent outline-none transition-all"></textarea>
            </div>
            
            <button type="submit" class="w-full py-4 px-6 bg-white text-black font-bold rounded-2xl hover:bg-opacity-90 active:scale-95 transition-all duration-200 shadow-lg">
                Send it 🚀
            </button>
        </form>

        <div id="successMessage" class="mt-8 p-4 bg-white/20 border border-white/30 rounded-2xl hidden animate-bounce">
            <p class="text-center font-medium">secured the bag! 🫡<br>
            <span class="text-sm opacity-80 text-white">check your email client to finish sending.</span>
            </p>
        </div>
        
        <div class="mt-8 pt-6 border-t border-white/10 text-center">
            <a href="./index.html" class="text-sm text-white/50 hover:text-white transition-colors">← back to base</a>
        </div>
    </div>

    <script>
    document.getElementById('contactForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const name = document.getElementById('name').value;
        const message = document.getElementById('message').value;
        
        // Retaining your privacy-focused email logic
        const myEmail = 'ayt04.xyz.little873@passinbox.com';
        const subject = encodeURIComponent(`${name}`);
        const body = encodeURIComponent(`${message}`);
        const bioSignalNote = encodeURIComponent(`\n\nSent via ayt04.xyz`);
        
        const mailtoLink = `mailto:${myEmail}?subject=${subject}&body=${body}${bioSignalNote}`;

        window.open(mailtoLink, '_blank');
        document.getElementById('successMessage').classList.remove('hidden');
    });
</script>
</body>
</html>
