<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Maps</title>
    <!-- Include Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Set the map container height and width */
        #map {
            height: 700px;
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Map container -->
    <div id="map"></div>

    <!-- Include Leaflet JavaScript -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Define the latitude and longitude for the map center (e.g., Washington, DC)
        const latitude = 45.424758;
        const longitude = -75.699642;
        const zoomLevel = 14;

        // Initialize the map on the 'map' div
        const map = L.map('map').setView([latitude, longitude], zoomLevel);

        // Add OpenStreetMap tiles to the map
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Add a marker at the specified coordinates
        const marker = L.marker([latitude, longitude]).addTo(map);

        // Bind a popup to the marker with information
        //marker.bindPopup(`
        //    Latitude: ${latitude}<br>
         //   Longitude: ${longitude}
        //`).openPopup();

        // Optional: Add a click event to the marker to re-open the popup
        marker.on('click', function () {
            marker.openPopup();
        });
    </script>
</body>
</html>
