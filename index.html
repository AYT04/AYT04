        // ================= SPA NAVIGATION ENGINE =================
        function navigate(routeId) {
            // Update URL Hash
            window.location.hash = `#/${routeId}`;
        }

        function handleSPAHashRoute() {
            const rawHash = window.location.hash || '#/home';
            const routeId = rawHash.replace('#/', '');

            // Hide all routing container pages
            document.querySelectorAll('.app-route').forEach(page => page.classList.add('hidden'));
            
            // Remove active indicator classes from top nav links
            document.querySelectorAll('.glass-nav-btn').forEach(btn => btn.classList.remove('active'));

            const targetPage = document.getElementById(`page-${routeId}`);
            const targetNav = document.getElementById(`nav-${routeId}`);

            if (targetPage) {
                targetPage.classList.remove('hidden');
            } else {
                // Fallback to home
                document.getElementById('page-home').classList.remove('hidden');
                document.getElementById('nav-home').classList.add('active');
                return;
            }

            if (targetNav) {
                targetNav.classList.add('active');
            }
        }

        window.addEventListener('hashchange', handleSPAHashRoute);


        // ================= NOTIFICATION TOAST WRAPPERS =================
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            toast.className = `p-4 rounded-2xl glass-panel text-white text-xs font-semibold flex items-center gap-2 shadow-2xl transition-all duration-300 translate-y-2 opacity-0 select-none pointer-events-auto border-l-4`;
            
            if (type === 'success') {
                toast.classList.add('border-l-emerald-500');
                toast.innerHTML = `<i data-lucide="check-circle" class="text-emerald-400 w-4 h-4"></i> ${message}`;
            } else if (type === 'warning') {
                toast.classList.add('border-l-amber-500');
                toast.innerHTML = `<i data-lucide="alert-triangle" class="text-amber-400 w-4 h-4"></i> ${message}`;
            } else {
                toast.classList.add('border-l-[#ff0033]');
                toast.innerHTML = `<i data-lucide="alert-circle" class="text-red-400 w-4 h-4"></i> ${message}`;
            }

            container.appendChild(toast);
            lucide.createIcons();

            // Animate In
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            // Animate Out & Remove
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-1');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3500);
        }

        // ================= SHULKEROS DOCUMENTATION ENGINE =================
        function switchDocTab(tabId) {
            // Hide all sub sections
            document.querySelectorAll('.doc-tab-content').forEach(sec => sec.classList.add('hidden'));

            // Remove active class from menu buttons
            document.querySelectorAll('.doc-sidebar-btn').forEach(btn => btn.classList.remove('active'));

            // Show selected view
            const targetSection = document.getElementById(`doc-section-${tabId}`);
            const targetButton = document.getElementById(`doc-link-${tabId}`);

            if (targetSection) {
                targetSection.classList.remove('hidden');
            }
            if (targetButton) {
                targetButton.classList.add('active');
                
                // Update breadcrumbs visually
                const menuTitle = targetButton.innerText.trim();
                document.getElementById('doc-breadcrumb').innerText = menuTitle;
            }
        }

        function handleContactSubmit(e) {
            e.preventDefault();
            const subjectInput = document.getElementById('contact-subject').value;
            const messageInput = document.getElementById('contact-message').value;

            const email = 'ayt04@duck.com';
            const subject = encodeURIComponent(subjectInput);
            
            const mailtoLink = `mailto:${email}?subject=${subject}`;

            window.open(mailtoLink, '_blank');
            
            document.getElementById('contact-success').classList.remove('hidden');
            showToast("Check your Inbox!");
        }


        // ================= APPLICATION SYSTEM BOOTSTRAP =================
        window.onload = function() {
            lucide.createIcons();
            switchDocTab('home');
            handleSPAHashRoute();
        };
