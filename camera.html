<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera</title>
  <!-- Web Manifest for PWA Installation -->
  <link rel="manifest" href="manifest.json" />
  <!-- Favicon -->
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <!-- Bootstrap CSS for styling -->
  <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { font-family: Arial, sans-serif; background-color: #f8f9fa; }
    header { font-weight: bold; background-color: #343a40; color: white; text-align: center; padding: 1rem; }
    #cameraView { position: relative; margin: 2rem auto; width: 100%; max-width: 500px; }
    #video { width: 100%; border: 1px solid #ccc; border-radius: 4px; }
    #captureBtn { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background-color: #007bff; border: none; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
    #captureBtn:hover { background-color: #0056b3; }
    #photo { margin-top: 1rem; max-width: 100%; border: 1px solid #ddd; border-radius: 4px; display: none; }
    .gallery { margin-top: 2rem; padding: 1rem; background-color: #fff; border-radius: 4px; }
    .gallery img { max-width: 100px; margin: 0.5rem; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; }
    .gallery h3 { margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header class="bg-dark text-white text-center p-4">
    Vanilla PWA Camera
  </header>

  <section class="container mt-5" id="camera">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <h2 class="text-center mb-4">Take a Picture</h2>
        <div id="cameraView">
          <video autoplay playsinline id="video" width="100%" height="auto"></video>
          <button class="btn btn-primary w-100 mt-3" id="captureBtn">Capture</button>
        </div>
        <img class="mt-3" id="photo" alt="Captured Photo" />
      </div>
    </div>
  </section>

  <section class="container gallery" id="gallery" style="display: none;">
    <h3 class="text-center">Your Photos</h3>
    <div id="galleryImages"></div>
  </section>

  <!-- Bootstrap & jQuery JS -->
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
  <!-- Camera JS -->
  <script>
    // Service Worker Registration for Offline Functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/service-worker.js')
          .then(function(registration) {
            console.log('Service Worker registered with scope:', registration.scope);
          })
          .catch(function(error) {
            console.log('Service Worker registration failed:', error);
          });
      });
    }

    // Check for Camera API Support and Initialize
    const video = document.getElementById('video');
    const captureBtn = document.getElementById('captureBtn');
    const photo = document.getElementById('photo');
    const gallerySection = document.getElementById('gallery');
    const galleryImages = document.getElementById('galleryImages');

    // Initialize the camera when the page loads
    window.addEventListener('load', async function() {
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = stream;
          video.play();
        } catch (error) {
          console.log('Error accessing camera:', error);
          alert('Unable to access the camera. Please check your permissions.');
        }
      } else {
        console.log('getUserMedia API not supported by the browser');
        alert('Your browser does not support camera access.');
      }
    });

    // Capture Button Event Listener
    captureBtn.addEventListener('click', function() {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const context = canvas.getContext('2d');
      context.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Convert canvas to image data URL
      const dataURL = canvas.toDataURL('image/png');
      photo.setAttribute('src', dataURL);
      photo.style.display = 'block';

      // Save the image to the browser's cache using the Cache API
      // This enables offline access to the captured photo
      caches.open('pwa-camera-cache')
        .then(cache => {
          const request = new Request(dataURL);
          return cache.put(request, new Response(request));
        })
        .catch(err => console.error('Error saving image to cache:', err));

      // Add the image to the gallery
      const imgElement = document.createElement('img');
      imgElement.src = dataURL;
      imgElement.alt = 'Captured Photo';
      imgElement.onclick = function() {
        photo.src = this.src;
        photo.style.display = 'block';
      };
      galleryImages.appendChild(imgElement);
      gallerySection.style.display = 'block';
    });

    // Optional: Add a button to switch to the gallery view
    // This would require additional JavaScript to manage the view switching
  </script>
</body>
</html>
