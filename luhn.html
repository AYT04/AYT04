<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luhn Algorithm Demonstrator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .container {
            max-width: 90%;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="container mx-auto p-8 bg-white rounded-xl shadow-lg w-full md:w-2/3 lg:w-1/2">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-4">Luhn Algorithm Demonstrator</h1>
        <p class="text-gray-600 text-center mb-6">
            This tool can validate any number using the Luhn algorithm or generate a new number that passes the check.
        </p>

        <!-- Validation Section -->
        <div class="mb-8">
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Validate a Number</h2>
            <div class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-4">
                <input id="validateInput" type="text" placeholder="Enter a number (e.g., 49927398716)"
                       class="flex-grow p-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
                <button id="validateBtn"
                        class="bg-blue-600 text-white font-medium py-3 px-6 rounded-lg hover:bg-blue-700 transition duration-200">
                    Validate
                </button>
            </div>
            <div id="validateResult" class="mt-4 p-4 rounded-lg text-white font-medium text-center hidden"></div>
        </div>

        <!-- Generation Section -->
        <div>
            <h2 class="text-xl font-semibold text-gray-700 mb-4">Generate a Valid Number</h2>
            <div class="flex items-center justify-between">
                <button id="generateBtn"
                        class="bg-green-600 text-white font-medium py-3 px-6 rounded-lg hover:bg-green-700 transition duration-200">
                    Generate
                </button>
                <div id="generateResult" class="text-lg font-mono text-gray-800 p-3 bg-gray-200 rounded-lg">
                    Click "Generate"
                </div>
            </div>
        </div>

    </div>

    <script>
        // DOM element references
        const validateInput = document.getElementById('validateInput');
        const validateBtn = document.getElementById('validateBtn');
        const validateResult = document.getElementById('validateResult');
        const generateBtn = document.getElementById('generateBtn');
        const generateResult = document.getElementById('generateResult');

        /**
         * Validates a number using the Luhn algorithm.
         * @param {string} numberString The number to validate as a string.
         * @returns {boolean} True if the number is valid, false otherwise.
         */
        function luhnCheck(numberString) {
            // Remove any non-digit characters
            const digits = numberString.replace(/\D/g, '');
            if (digits.length === 0) {
                return false;
            }

            let sum = 0;
            let double = false;
            // Iterate from right to left
            for (let i = digits.length - 1; i >= 0; i--) {
                let digit = parseInt(digits.charAt(i), 10);
                if (double) {
                    digit *= 2;
                    if (digit > 9) {
                        digit -= 9;
                    }
                }
                sum += digit;
                // Alternate between doubling and not doubling
                double = !double;
            }
            // A valid number will have a sum that is a multiple of 10
            return (sum % 10) === 0;
        }

        /**
         * Generates a new number that passes the Luhn algorithm check.
         * @param {number} length The desired length of the number.
         * @returns {string} The generated, valid number.
         */
        function generateValidLuhnNumber(length = 9) {
            // Generate a number with one less digit than the desired length
            const digits = [];
            for (let i = 0; i < length - 1; i++) {
                // Use a secure random number generator
                const randomDigit = Math.floor(Math.random() * 10);
                digits.push(randomDigit);
            }
            let numberString = digits.join('');

            // Calculate the checksum for the generated number
            let sum = 0;
            let double = true; // Start with doubling the last digit of the partial number
            for (let i = numberString.length - 1; i >= 0; i--) {
                let digit = parseInt(numberString.charAt(i), 10);
                if (double) {
                    digit *= 2;
                    if (digit > 9) {
                        digit -= 9;
                    }
                }
                sum += digit;
                double = !double;
            }

            // The checksum digit is the number needed to make the total sum a multiple of 10
            const checkDigit = (10 - (sum % 10)) % 10;
            
            // Append the checksum digit to the end
            return numberString + checkDigit;
        }

        // Event listener for the "Validate" button
        validateBtn.addEventListener('click', () => {
            const numberToValidate = validateInput.value;
            const isValid = luhnCheck(numberToValidate);
            validateResult.classList.remove('hidden');

            if (isValid) {
                validateResult.textContent = 'This number is VALID! ✅';
                validateResult.classList.remove('bg-red-500');
                validateResult.classList.add('bg-green-500');
            } else {
                validateResult.textContent = 'This number is INVALID. ❌';
                validateResult.classList.remove('bg-green-500');
                validateResult.classList.add('bg-red-500');
            }
        });

        // Event listener for the "Generate" button
        generateBtn.addEventListener('click', () => {
            const newNumber = generateValidLuhnNumber();
            generateResult.textContent = newNumber;
        });
    </script>
</body>
</html>
